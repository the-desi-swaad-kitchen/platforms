<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The Desi Swaad Kitchen</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f6ebd9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Main card */

    .container {
      max-width: 420px;
      width: 100%;
      background: #fff7ea;
      border: 3px solid #8a3b1a;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .logo img {
      width: 240px;
      margin-bottom: 10px;
    }

    /* Heading */

    h1 {
      font-size: 26px;
      color: #8a3b1a;
      margin-bottom: 6px;
    }

    .tagline {
      color: #556b2f;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 15px;
    }

    /* Ribbon */

    .ribbon {
      background: #e6edd5;
      color: #556b2f;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid #c8d3a8;
    }

    /* Buttons */

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      position: relative;
      overflow: hidden;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    /* Click effect */

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }


    /* Shine animation */

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent);
      transition: 0.5s;
    }

    .btn:hover::after {
      left: 120%;
    }

    /* Logos */

    .btn img {
      width: 22px;
    }

    /* Brand colors */

    .swiggy {
      background: #fc8019;
    }

    .zomato {
      background: #e23744;
    }

    .magicpin {
      background: #6b3df5;
    }

    .maps {
      background: #1a73e8;
    }

    .direct {
      background: #2e7d32;
    }

    /* Footer */

    footer {
      margin-top: 18px;
      font-size: 12px;
      color: #8a3b1a;
    }

    .phone {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      background: #fff2cc;
      border: 2px solid #8a3b1a;
      border-radius: 30px;
      text-decoration: none;
      color: #8a3b1a;
      font-weight: 700;
      font-size: 16px;

      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: 0.2s;
    }

    .phone:hover {
      background: #ffe7a3;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">
      <img src="images/logo.png" alt="The Desi Swaad Kitchen Logo">
    </div>

    <div class="tagline">
      North Indian • Breakfast • Snacks • Fresh Juices
    </div>

    <div class="ribbon">
      Choose where you'd like to order from
    </div>

    <a class="btn zomato" href="https://www.zomato.com/bangalore/the-desi-swaad-kitchen-btm-bangalore/order"
      target="_blank">
      <img src="images/Zomato.webp">
      Order on Zomato
    </a>

    <a class="btn swiggy" href="https://www.swiggy.com/city/bangalore/the-desi-swaad-kitchen-btm-rest1315758"
      target="_blank">
      <img src="images/Swiggy.webp">
      Order on Swiggy
    </a>

    <a class="btn direct" href="https://wa.me/919380971030" target="_blank">
      <img src="images/whatsapp.webp">
      Order Directly
    </a>

    <a class="btn maps" href="https://share.google/yWmUyBi2zKxKLqXX1" target="_blank">
      <img src="images/maps.webp">
      Find us on Google Maps
    </a>

    <footer>

      <a class="phone" href="tel:+919380971030">
        📞 Call us: 93809 71030
      </a>

    </footer>

  </div>

</body>

</html>
